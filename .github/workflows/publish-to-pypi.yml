name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI


on:
  push: {}
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: uv build
      - name: Verify artifacts
        run: 'test -n "$(ls -A dist)"'
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI on main pushes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Publish to TestPyPI (OIDC)
        # --check-url skips uploads of files already on TestPyPI so commits to
        # main don't fail just because the version hasn't been bumped yet. The
        # production publish on tag push intentionally does NOT skip — re-pushing
        # a tag should fail loudly, since it usually means a mistake.
        run: |
          uv publish \
            --publish-url https://test.pypi.org/legacy/ \
            --check-url https://test.pypi.org/simple/ \
            dist/*

  publish-pypi:
    name: Publish to PyPI on tags
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-printable
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI (OIDC)
        run: uv publish dist/*
