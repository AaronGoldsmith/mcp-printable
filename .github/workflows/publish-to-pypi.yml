name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI


on:
  push: {}
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: uv build
      - name: Verify artifacts
        run: 'test -n "$(ls -A dist)"'
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    # Manual dry-run only. Trigger from the Actions tab when you want to verify
    # a build will publish cleanly before tagging a real release. Auto-publish
    # on every main push was removed because uv publish errors on identical
    # version + different content (typical for README-only commits), and
    # bumping the version per commit defeats the purpose of versioning.
    name: Publish to TestPyPI (manual)
    if: github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Publish to TestPyPI (OIDC)
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pypi:
    name: Publish to PyPI on tags
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-printable
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI (OIDC)
        run: uv publish dist/*
